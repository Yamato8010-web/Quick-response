<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Interpreter Training</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f5f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:420px;
}

h1{
    text-align:center;
    color:#2c3e50;
    margin-bottom:8px;
    font-size:32px;
}

.subtitle{
    text-align:center;
    color:#777;
    margin-bottom:35px;
    font-size:15px;
}

.card{
    background:white;
    border-radius:18px;
    padding:22px;
    margin-bottom:18px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
    transition:.25s;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-4px);
    box-shadow:0 12px 24px rgba(0,0,0,.12);
}

.card h2{
    color:#4255ff;
    margin-bottom:8px;
}

.card p{
    color:#666;
    margin-bottom:18px;
    line-height:1.5;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#4255ff;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#3044ee;
}

.footer{
    text-align:center;
    color:#999;
    margin-top:30px;
    font-size:13px;
}

</style>

</head>
<body>

<div class="container">

<h1>🌏 Interpreter Training</h1>
<div class="subtitle">
Choose your training
</div>

<div class="card">

<h2>⚡ Quick Response</h2>

<p>
Improve your vocabulary and instant response skills.
</p>

<button onclick="location.href='quick/index.html'">
START
</button>

</div>

<div class="card">

<h2>📝 Summarization</h2>

<p>
Practice listening and summarizing important points.
</p>

<button onclick="location.href='summarization/index.html'">
START
</button>

</div>

<div class="card">

<h2>🎤 Short Interpretation</h2>

<p>
Develop your consecutive interpreting skills.
</p>

<button onclick="location.href='interpretation/index.html'">
START
</button>

</div>

<div class="footer">
Version 1.0
</div>

</div>

</body>
</html>
