<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quick Response</title>
    
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#4285f4">

<style>

body{
    font-family:'Segoe UI', Arial, sans-serif;
    background:#cccccc;
    text-align:center;
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    margin-top:30px;
    background:#e9e9e9;
    padding:40px;
    border-radius:24px;
}

.logo{
    color:#4255ff;
    font-weight:bold;
    font-size:14px;
    letter-spacing:1px;
    margin-bottom:10px;
}

h1{
    color:#2d2f36;
    font-size:42px;
    margin-bottom:40px;
}

.app-title{
    display:inline-block;
    background:white;
    color:black;
    font-size:38px;
    font-weight:800;
    padding:18px 40px;
    border-radius:20px;

    box-shadow:
        0 6px 0 #d9defa,
        0 12px 24px rgba(0,0,0,0.08);

    margin-bottom:30px;
}

/*言語ボタンサイズ*/
.language-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    margin-top:30px;
}

.language-btn{
    display:none;/* 読み込み前は言語ボタンを隠す */
    color:white;
    border:none;
    border-radius:18px;
    padding:20px;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    transition:all 0.2s ease;
}
   
/* 確認後に表示 */
.language-btn.show{
    display:block;
}
    
/*言語ボタンの色*/
.en{
    background:#4255ff;
}

.zh{
    background:#F44336;
}

.pt{
    background:#009688;
}

.mn{
    background:#FF9800;
}

.ko{
    background:#7C3AED;
}

.fr{
    background:#2563EB;
}

.vi{
    background:#10B981;
}

.de{
    background:#374151;
}

.km{
    background:#D97706;
}
    
.language-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 20px rgba(66,85,255,0.3);
}

.language-btn:active{
    transform:translateY(1px);
}

.description{
    color:#666;
    font-size:18px;
    margin-top:15px;
    line-height:1.6;
}
    
.title-main{
    font-size:22px;
    font-weight:800;
    color:#000;
    line-height:1.2;
}

.title-sub{
    font-size:16px;
    font-weight:700;
    color:#000;
    letter-spacing:1px;
    margin-top:4px;
}

.card{
    background:white;
    border-radius:24px;
    padding:30px;
    margin:35px 0;

    box-shadow:
        0 15px 30px rgba(0,0,0,0.12);

    border:1px solid #eeeeee;
}
    
 /*準備中ボタン押せない*/
    .disabled{
    background:#cfcfcf;
    color:#666;
    cursor:not-allowed;
    pointer-events:none;
    }
    
/*スマホ用言語ボタンサイズ*/
@media (max-width:768px){

    .language-grid{
        grid-template-columns:repeat(2,1fr);
    }

    .language-btn{
        font-size:18px;
        padding:16px;
    }
    
   
}
 
</style>

</head>

<body>

<div class="container">
    
<div class="app-title">
    <div class="title-main">天理教用語</div>
    <div class="title-sub">Quick Response</div>
</div>
    
<div class="logo">
INTERPRETER TRAINING
</div>


<div class="description">
学習したいコースと言語を選択してください
</div>


<div class="card">

<h2>🌏 General</h2>

<div class="language-grid">

<button id="General-en" class="language-btn en"
onclick="selectLanguage('General','en')">
🇺🇸 English
</button>

<button id="General-zh" class="language-btn zh"
onclick="selectLanguage('General','zh')">
🇨🇳 中文
</button>

<button id="General-pt" class="language-btn pt"
onclick="selectLanguage('General','pt')">
🇧🇷 Português
</button>

<button id="General-mn" class="language-btn mn"
onclick="selectLanguage('General','mn')">
🇲🇳 Монгол
</button>

</div>

</div>

<div class="card">

<h2>📚 Vocabulary</h2>

<div class="language-grid">

<button id="Vocabulary-en" class="language-btn en"
onclick="selectLanguage('Vocabulary','en')">
🇺🇸 English
</button>

<button id="Vocabulary-zh" class="language-btn zh"
onclick="selectLanguage('Vocabulary','zh')">
🇨🇳 中文
</button>

<button id="Vocabulary-ko" class="language-btn ko"
onclick="selectLanguage('Vocabulary','ko')">
🇰🇷 한국어
</button>

<button id="Vocabulary-pt" class="language-btn pt"
onclick="selectLanguage('Vocabulary','pt')">
🇧🇷 Português
</button>

<button id="Vocabulary-fr" class="language-btn fr"
onclick="selectLanguage('Vocabulary','fr')">
🇫🇷 Français
</button>

<button id="Vocabulary-mn" class="language-btn mn"
onclick="selectLanguage('Vocabulary','mn')">
🇲🇳 Монгол
</button>

<button id="Vocabulary-vi" class="language-btn vi"
onclick="selectLanguage('Vocabulary','vi')">
🇻🇳 Tiếng Việt
</button>

<button id="Vocabulary-de" class="language-btn de"
onclick="selectLanguage('Vocabulary','de')">
🇩🇪 Deutsch
</button>

<button id="Vocabulary-km" class="language-btn km"
onclick="selectLanguage('Vocabulary','km')">
🇰🇭 ខ្មែរ
</button>

</div>

</div>
        
<div class="card">

<h2>💬 Expression</h2>

<div class="language-grid">

<button id="Expression-en" class="language-btn en"
onclick="selectLanguage('Expression','en')">
🇺🇸 English
</button>

<button id="Expression-zh" class="language-btn zh"
onclick="selectLanguage('Expression','zh')">
🇨🇳 中文
</button>

<button id="Expression-ko" class="language-btn ko"
onclick="selectLanguage('Expression','ko')">
🇰🇷 한국어
</button>

<button id="Expression-pt" class="language-btn pt"
onclick="selectLanguage('Expression','pt')">
🇧🇷 Português
</button>

<button id="Expression-fr" class="language-btn fr"
onclick="selectLanguage('Expression','fr')">
🇫🇷 Français
</button>

<button id="Expression-mn" class="language-btn mn"
onclick="selectLanguage('Expression','mn')">
🇲🇳 Монгол
</button>

<button id="Expression-vi" class="language-btn vi"
onclick="selectLanguage('Expression','vi')">
🇻🇳 Tiếng Việt
</button>

<button id="Expression-de" class="language-btn de"
onclick="selectLanguage('Expression','de')">
🇩🇪 Deutsch
</button>

<button id="Expression-km" class="language-btn km"
onclick="selectLanguage('Expression','km')">
🇰🇭 ខ្មែរ
</button>

</div>

</div>
    
</div>

<script>
async function checkLanguages(){

    const categories = [
        "General",
        "Vocabulary",
        "Expression"
    ];

    const languages = [
        "en",
        "zh",
        "ko",
        "pt",
        "fr",
        "mn",
        "vi",
        "de",
        "km"
    ];


    const response = await fetch(
    "https://script.google.com/macros/s/AKfycbz4RC1MjqKRTuW2PHHdCOd4e5l_1QZUVagJyOi2b1tgjVCBHgIB1BwI794njktyrxlx/exec"
    );


    const allWords = await response.json();


    categories.forEach(category=>{

        const words = allWords[category];


        languages.forEach(lang=>{

            const button =
            document.getElementById(category+"-"+lang);


            if(!button) return;


            const available =
words.some(word=>word[lang]);


button.classList.add("show");


if(!available){

    button.classList.add("disabled");

    button.innerHTML =
    button.innerHTML + "<br>準備中";

    button.onclick=null;

}

        });

        });

}


function selectLanguage(category, lang){

    localStorage.setItem("category", category);
    localStorage.setItem("language", lang);

    window.location.href = "instructions.html";

}


checkLanguages();
    
</script>

</body>

</html>
