<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>クイックレスポンス</title>

<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#4285f4">

<style>

body{
    font-family:'Segoe UI', Arial, sans-serif;
    background:#f6f7fb;
    text-align:center;
    margin:0;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
    margin-top:30px;
    background:white;
    padding:40px;
    border-radius:24px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.logo{
    color:#4255ff;
    font-weight:bold;
    font-size:14px;
    letter-spacing:1px;
    margin-bottom:10px;
}

h1{
    color:#2d2f36;
    font-size:42px;
    margin-bottom:40px;
}

.language-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    margin-top:30px;
}

.language-btn{
    color:white;
    border:none;
    border-radius:18px;
    padding:20px;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    transition:all 0.2s ease;
}

.en{
    background:#4CAF50;
}

.zh{
    background:#F44336;
}

.pt{
    background:#009688;
}

.mn{
    background:#FF9800;
}

.language-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 20px rgba(66,85,255,0.3);
}

.language-btn:active{
    transform:translateY(1px);
}

.description{
    color:#666;
    font-size:18px;
    margin-top:15px;
    line-height:1.6;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
INTERPRETER TRAINING
</div>

<h1>⚡ クイックレスポンス</h1>

<div class="description">
学習したい言語を選択してください
</div>

<div class="language-grid">

<button class="language-btn" onclick="selectLanguage('en')">
🇺🇸 English
</button>

<button class="language-btn zh" onclick="selectLanguage('zh')">
🇨🇳 中文
</button>

<button class="language-btn pt" onclick="selectLanguage('pt')">
🇧🇷 Português
</button>

<button class="language-btn mn" onclick="selectLanguage('mn')">
🇲🇳 Монгол
</button>

</div>

</div>

<script>

function selectLanguage(lang){

    localStorage.setItem("language", lang);

    window.location.href = "quiz.html";

}

</script>

</body>

</html>
