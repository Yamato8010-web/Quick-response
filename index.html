<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>クイックレスポンス</title>

<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#4285f4">

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    text-align:center;
    padding:30px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
    width:250px;
    padding:15px;
    margin:10px;
    font-size:20px;
    cursor:pointer;
    border:none;
    border-radius:10px;
    color:white;
    font-weight:bold;
}

.en{
    background:#4285f4;
}

.zh{
    background:#d32f2f;
}

.pt{
    background:#2e7d32;
}

.mn{
    background:#f57c00;
}

.en:hover,
.zh:hover,
.pt:hover,
.mn:hover{
    opacity:0.85;
}

</style>

</head>

<body>

<div class="container">

<h1>クイックレスポンス</h1>

<h2>言語を選択</h2>

<button class="en" onclick="selectLanguage('en')">
🇺🇸 英語
</button>
<br>

<button class="zh" onclick="selectLanguage('zh')">
🇨🇳 中国語
</button>
<br>

<button class="pt" onclick="selectLanguage('pt')">
🇧🇷 ポルトガル語
</button>
<br>

<button class="mn" onclick="selectLanguage('mn')">
🇲🇳 モンゴル語
</button>

</div>

<script>

function selectLanguage(lang){

    localStorage.setItem("language", lang);

    window.location.href = "quiz.html";

}

</script>

</body>

</html>
