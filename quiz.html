<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<div class="app-title">
Quick Response
</div>

<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#4285f4">

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    text-align:center;
    padding:30px;
}

 

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

   .app-title{
    display:inline-block;
    background:white;
    color:#4255ff;
    font-size:38px;
    font-weight:800;
    padding:18px 40px;
    border-radius:20px;

    box-shadow:
        0 6px 0 #d9defa,
        0 12px 24px rgba(0,0,0,0.08);

    margin-bottom:30px;
}
    
#question{
    font-size:32px;
    margin:40px 0;
    font-weight:bold;
}

#answer{
    font-size:28px;
    color:#0066cc;
    margin:30px 0;
    display:none;
}

button{
    background:#4255ff;
    color:white;
    border:none;
    border-radius:14px;
    padding:14px 28px;
    margin:10px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:all 0.2s ease;
}
    
.next-btn {
    background: #ff3b30;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: bold;
}
    
button:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 15px rgba(66,85,255,0.3);
}

button:active{
    transform:translateY(1px);
}

</style>
</head>

<body>

<div class="container">

<div style="
color:#4255ff;
font-weight:bold;
font-size:14px;
letter-spacing:1px;
margin-bottom:10px;
">
INTERPRETER TRAINING
</div>


<div id="question">
読み込み中...
</div>

<div id="answer"></div>

<button class="next-btn" onclick="nextQuestion()">
次へ
</button>

<button onclick="goBack()">
言語選択へ戻る
</button>

</div>

<script>

let words = [];
let currentWord;
let answerTimer;

async function loadJSON() {

    try {

        const response = await fetch("words.json");

        if(!response.ok){
            throw new Error("words.json が見つかりません");
        }

        words = (await response.json()).filter(item =>
            item.jp &&
            item.jp.trim() !== ""
        );

        nextQuestion();

    } catch(error) {

        document.getElementById("question").innerText =
            "エラー：" + error.message;

        console.error(error);

    }
}

function nextQuestion(){

    if(words.length === 0) return;

    clearTimeout(answerTimer);

    const lang =
        localStorage.getItem("language");

    currentWord =
        words[Math.floor(Math.random() * words.length)];

    document.getElementById("question").innerText =
        currentWord.jp;

    document.getElementById("answer").style.display =
        "none";

    switch(lang){

        case "en":
            document.getElementById("answer").innerText =
                currentWord.en;
            break;

        case "zh":
            document.getElementById("answer").innerText =
                currentWord.zh;
            break;

        case "pt":
            document.getElementById("answer").innerText =
                currentWord.pt;
            break;

        case "mn":
            document.getElementById("answer").innerText =
                currentWord.mn;
            break;

        default:
            document.getElementById("answer").innerText =
                currentWord.en;
    }

    answerTimer = setTimeout(() => {

        document.getElementById("answer").style.display =
            "block";

    }, 5000);

}

function goBack(){

    window.location.href = "index.html";

}

loadJSON();

</script>

</body>
</html>
