<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>クイックレスポンス</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    text-align:center;
    padding:30px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

#question{
    font-size:32px;
    margin:40px 0;
    font-weight:bold;
}

#answer{
    font-size:28px;
    color:#0066cc;
    margin:30px 0;
    display:none;
}

button{
    padding:12px 25px;
    margin:10px;
    font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<h1>クイックレスポンス</h1>

<div id="question">
読み込み中...
</div>

<div id="answer"></div>

<button onclick="showAnswer()">
答えを見る
</button>

<button onclick="nextQuestion()">
次へ
</button>

</div>

<script>

let words = [];
let currentWord;

async function loadCSV() {

    const response = await fetch("words.csv");
    const csvText = await response.text();

    const lines = csvText.split("\n");

    for(let i = 1; i < lines.length; i++){

        const cols = lines[i].split(",");

        if(cols.length < 6) continue;

        words.push({
            jp: cols[1]?.trim(),
            en: cols[2]?.trim(),
            zh: cols[3]?.trim(),
            pt: cols[4]?.trim(),
            mn: cols[5]?.trim()
        });

    }

    nextQuestion();
}

function nextQuestion(){

    if(words.length === 0) return;

    const lang =
        localStorage.getItem("language");

    currentWord =
        words[Math.floor(Math.random() * words.length)];

    document.getElementById("question").innerText =
        currentWord.jp;

    document.getElementById("answer").style.display =
        "none";

    switch(lang){

        case "en":
            document.getElementById("answer").innerText =
                currentWord.en;
            break;

        case "zh":
            document.getElementById("answer").innerText =
                currentWord.zh;
            break;

        case "pt":
            document.getElementById("answer").innerText =
                currentWord.pt;
            break;

        case "mn":
            document.getElementById("answer").innerText =
                currentWord.mn;
            break;
    }
}

function showAnswer(){

    document.getElementById("answer").style.display =
        "block";

}

loadCSV();
