<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quick Response</title>

<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#4285f4">

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    text-align:center;
    padding:30px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.app-title{
    display:inline-block;
    background:white;
    color:black;
    font-size:38px;
    font-weight:800;
    padding:18px 40px;
    border-radius:20px;
    box-shadow:
        0 6px 0 #d9defa,
        0 12px 24px rgba(0,0,0,0.08);
    margin-bottom:30px;
}

#question{
    font-size:32px;
    margin:40px 0;
    font-weight:bold;
}

#timer{
    font-size:28px;
    font-weight:bold;
    color:#ff3b30;
    margin:10px 0;
}

#answer{
    font-size:28px;
    color:#0066cc;
    margin:30px 0;
    display:none;
}

button{
    background:#4255ff;
    color:white;
    border:none;
    border-radius:14px;
    padding:14px 28px;
    margin:10px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:all 0.2s ease;
}

.next-btn{
    background:#ff3b30;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 15px rgba(66,85,255,0.3);
}

button:active{
    transform:translateY(1px);
}

.timer-circle {
    display:flex;
    justify-content:center;
    margin:20px 0;
}

@keyframes popIn {
    0% {
        transform: scale(0.6);
        opacity: 0;
    }

    60% {
        transform: scale(1.15);
        opacity: 1;
    }

    100% {
        transform: scale(1);
        opacity: 1;
    }
}

.countdown-animation {
    animation: popIn 0.4s ease;
}

.selected-rating{
    outline:4px solid white;
    box-shadow:0 0 0 3px #333;
    transform:scale(1.08);
}

#pauseBtn{
    display:none;
    background:#111;
}

.title-main{
    font-size:22px;
    font-weight:800;
    color:#000;
    line-height:1.2;
}

.title-sub{
    font-size:16px;
    font-weight:700;
    color:#4255ff;
    letter-spacing:1px;
    margin-top:4px;
}  
</style>
</head>

<body>

<div class="container">

<div class="app-title">
    <div class="title-main">天理教用語</div>
    <div class="title-sub">Quick Response</div>
</div>

<div style="
color:#4255ff;
font-weight:bold;
font-size:14px;
letter-spacing:1px;
margin-bottom:10px;
">
INTERPRETER TRAINING
</div>

<div id="question">
読み込み中...
</div>

<div class="timer-circle">
    <svg width="100" height="100">
        <circle
            cx="50"
            cy="50"
            r="45"
            stroke="#eee"
            stroke-width="8"
            fill="none"
        />
        <circle
            id="progress"
            cx="50"
            cy="50"
            r="45"
            stroke="#ff3b30"
            stroke-width="8"
            fill="none"
            stroke-linecap="round"
            stroke-dasharray="283"
            stroke-dashoffset="0"
        />
    </svg>
</div>
    
<div id="timer">5</div>

<div id="answer"></div>

<button id="showAnswerBtn" onclick="showAnswer()" style="background:#22c55e;">
    答えを表示
</button>

    <div id="reviewButtons" style="display:none; margin-top:20px;">

  <button
    id="goodBtn"
    onclick="rateAnswer('good')"
    style="background:#22c55e;">
    🟢 できた
</button>

<button
    id="almostBtn"
    onclick="rateAnswer('almost')"
    style="background:#f59e0b;">
    🟡 もう少し
</button>

<button
    id="hardBtn"
    onclick="rateAnswer('hard')"
    style="background:#ef4444;">
    🔴 がんばる
</button>
        
</div>
<button id="pauseBtn" onclick="togglePause()">
    ⏸ 一時停止
</button>
    
<button class="next-btn" onclick="nextQuestion()">
次へ
</button>

<button onclick="goBack()">
言語選択へ戻る
</button>

</div>

<script>

let words = [];
let answerTimer;
let timer;
let timeLeft = 5;
let firstQuestion = true;
let paused = false;

const totalTime = 5;
// -----------------------------
// JSON読み込み
// -----------------------------
async function loadJSON() {

    try {

        const response = await fetch("words.json");

        if(!response.ok){
            throw new Error("words.json が見つかりません");
        }

        words = await response.json();
        words.sort(() => Math.random() - 0.5);

        nextQuestion();

    } catch(error) {

        document.getElementById("question").innerText =
            "エラー：" + error.message;

        console.error(error);

    }
}

// -----------------------------
// 次の問題
// -----------------------------
function nextQuestion(){

    if(words.length === 0) return;

//スタート前のカウントダウン
 if(firstQuestion){

    firstQuestion = false;

    document.getElementById("answer").style.display = "none";
    document.getElementById("reviewButtons").style.display = "none";
    document.getElementById("goodBtn").classList.remove("selected-rating");
    document.getElementById("almostBtn").classList.remove("selected-rating");
    document.getElementById("hardBtn").classList.remove("selected-rating");
    document.getElementById("showAnswerBtn").style.display = "none";
    document.getElementById("timer").style.display = "none";
    document.getElementById("pauseBtn").style.display = "none";

    const sequence = ["READY", "3", "2", "1"];
    let index = 0;

     //カウントダウンテキストのアニメーション
    updateCountdownText(sequence[index]);

    const countdown = setInterval(() => {

        index++;

        if(index < sequence.length){

           updateCountdownText(sequence[index]);

        }else{

            clearInterval(countdown);

            // GO! を表示
            updateCountdownText("GO!");

            setTimeout(() => {

                document.getElementById("timer").style.display = "block";
                document.getElementById("showAnswerBtn").style.display = "inline-block";

                 // 一時停止ボタンを表示（ここで初めて出す）
                document.getElementById("pauseBtn").style.display = "inline-block";
                
                // 最初の問題へ
                nextQuestion();

            }, 500);

        }

    }, 1000);

    return;
}

    clearTimeout(answerTimer);
    clearInterval(timer);

    const lang = localStorage.getItem("language");

paused = false;
timeLeft = totalTime;

document.getElementById("pauseBtn").textContent =
    "⏸ 一時停止";
    
const word = words.pop();

    document.getElementById("question").textContent = word.jp;

   document.getElementById("answer").style.display = "none";
document.getElementById("showAnswerBtn").style.display = "inline-block";

    switch(lang){

        case "en":
            document.getElementById("answer").textContent = word.en;
            break;

        case "zh":
            document.getElementById("answer").textContent = word.zh;
            break;

        case "pt":
            document.getElementById("answer").textContent = word.pt;
            break;

        case "mn":
            document.getElementById("answer").textContent = word.mn;
            break;

        default:
            document.getElementById("answer").textContent = word.en;
    }

    startTimer();
}

// -----------------------------
// タイマー
// -----------------------------
function startTimer(){

    clearInterval(timer);

    const circle = document.getElementById("progress");
    const radius = 45;
    const circumference = 2 * Math.PI * radius;

    circle.style.strokeDasharray = circumference;

    timer = setInterval(() => {

        if(paused){
            return;
        }

        timeLeft -= 0.03;

        if(timeLeft < 0){
            timeLeft = 0;
        }

        // 数字
        document.getElementById("timer").textContent =
            Math.ceil(timeLeft);

        // 円形タイマー
        const progress = timeLeft / totalTime;
        circle.style.strokeDashoffset =
            circumference - (progress * circumference);

        // 時間切れ
        if(timeLeft <= 0){
            clearInterval(timer);
            showAnswer();
        }

    }, 30);

}

function updateCountdownText(text){

    const question = document.getElementById("question");

    question.classList.remove("countdown-animation");

    // アニメーションをリセット
    void question.offsetWidth;

    question.textContent = text;

    question.classList.add("countdown-animation");
}

// -----------------------------
// 答え表示
// -----------------------------
function showAnswer(){

    // タイマー停止
    clearInterval(timer);

    // 答えを表示
    document.getElementById("answer").style.display = "block";
    
    //評価ボタンを表示
    document.getElementById("reviewButtons").style.display = "block";

    // 「答えを表示」ボタンを隠す
    document.getElementById("showAnswerBtn").style.display = "none";
}
    //自己評価ボタンを押した後のアクション
   function rateAnswer(result){

    // いったん全部リセット
    document.getElementById("goodBtn").classList.remove("selected-rating");
    document.getElementById("almostBtn").classList.remove("selected-rating");
    document.getElementById("hardBtn").classList.remove("selected-rating");

    // 選択したものだけ強調
    if(result === "good"){
        document.getElementById("goodBtn").classList.add("selected-rating");
    }

    if(result === "almost"){
        document.getElementById("almostBtn").classList.add("selected-rating");
    }

    if(result === "hard"){
        document.getElementById("hardBtn").classList.add("selected-rating");
    }

    console.log("自己評価:", result);

}

function togglePause(){

    paused = !paused;

    if(paused){

        document.getElementById("pauseBtn").textContent =
            "▶ 再開";

    }else{

        document.getElementById("pauseBtn").textContent =
            "⏸ 一時停止";

    }

}
    
// -----------------------------
// 戻る
// -----------------------------
function goBack(){
    window.location.href = "index.html";
}

// -----------------------------
// 起動
// -----------------------------
loadJSON();

</script>

</body>
</html>
