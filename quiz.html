<script>

let words = [];
let currentWord;

async function loadJSON() {

    try {

        const response = await fetch("words.json");

        if(!response.ok){
            throw new Error("words.json が見つかりません");
        }

        words = await response.json();

        document.getElementById("question").innerText =
            "読込成功：" + words.length + "件";

        nextQuestion();

    } catch(error) {

        document.getElementById("question").innerText =
            "エラー：" + error.message;

        console.error(error);

    }
}

function nextQuestion(){

    if(words.length === 0) return;

    const lang =
        localStorage.getItem("language");

    currentWord =
        words[Math.floor(Math.random() * words.length)];

    document.getElementById("question").innerText =
        currentWord.jp;

    document.getElementById("answer").style.display =
        "none";

    switch(lang){

        case "en":
            document.getElementById("answer").innerText =
                currentWord.en;
            break;

        case "zh":
            document.getElementById("answer").innerText =
                currentWord.zh;
            break;

        case "pt":
            document.getElementById("answer").innerText =
                currentWord.pt;
            break;

        case "mn":
            document.getElementById("answer").innerText =
                currentWord.mn;
            break;

        default:
            document.getElementById("answer").innerText =
                currentWord.en;
    }
}

function showAnswer(){

    document.getElementById("answer").style.display =
        "block";

}

loadJSON();

</script>
