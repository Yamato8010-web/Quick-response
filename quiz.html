<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quick Response</title>
    
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#4285f4">

<style>

body{
    font-family: "Noto Sans JP", sans-serif;
    background:#cccccc;
    text-align:center;
    padding:30px;
    min-height:100vh;
}
    
    
.container{
    max-width:800px;
    margin:auto;
    background:#e9e9e9;
    padding:30px;
    border-radius:15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.12);
}


.app-title{
    display:inline-block;
    background:linear-gradient(180deg,#ffffff,#f4f4f4);

    padding:22px 45px;

    border-radius:22px;

    box-shadow:
    0 6px 0 #d9defa,
    0 14px 28px rgba(0,0,0,0.18),
    0 2px 6px rgba(255,255,255,0.9) inset;

    margin-bottom:15px;
}
    
 /*問題＋カード*/ 
#question{
    display:inline-block;

    min-width:260px;
    max-width:500px;

    background:#cfcfcf;

    color:#000;

    padding:20px 35px;

    border-radius:15px;

    box-shadow:0 10px 25px rgba(0,0,0,0.12);

    font-size:32px;
    font-weight:bold;

    margin:40px auto;
}
    
 /*タイマー数字*/ 
#timer{
    font-size:28px;
    font-weight:bold;
    color:#ff3b30;
    margin:10px 0;
}
 /*答え表示*/ 
#answer{
    font-size:28px;
    color:#0066cc;
    margin:30px 0;
    display:none;
}

button{
    background:#4255ff;
    color:white;
    border:none;
    border-radius:18px;
    box-shadow:0 4px 10px rgba(0,0,0,0.12);
    padding:14px 28px;
    margin:10px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:all 0.2s ease;
    text-shadow: 0 1px 2px rgba(0,0,0,0.8);
}
 /*次へボタン*/ 
.next-btn{
    background:#ff3b30;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 15px rgba(66,85,255,0.3);
}
    
#pauseBtn:hover{
    transform:translate(-50%, -50%) scale(1.08);
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

button:active{
    transform:translateY(1px);
}
#pauseBtn:active{
    transform:translate(-50%, -50%);
}

    
 /*円形タイマー*/ 
.timer-circle{
    position: relative;
    width: 100px;
    height: 100px;
    margin: 20px auto;
}
   
.timer-circle svg{
    position:absolute;
    top:0;
    left:0;
}
    
@keyframes popIn {
    0% {
        transform: scale(0.6);
        opacity: 0;
    }

    60% {
        transform: scale(1.15);
        opacity: 1;
    }

    100% {
        transform: scale(1);
        opacity: 1;
    }
}
 /*カウントダウンアニメーション*/
.countdown-animation {
    animation: popIn 0.4s ease;
}
@keyframes pausePop{
    0%{
        transform:translate(-50%, -50%) scale(1);
    }
    50%{
        transform:translate(-50%, -50%) scale(1.25);
    }
    100%{
        transform:translate(-50%, -50%) scale(1);
    }
}
 /*評価ボタン*/ 
.selected-rating{
    background:#d1d5db !important;
    border-width:4px !important;
    transform:scale(1.05);
}

/*web用停止ボタン*/    
#pauseBtn{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%, -50%);

    width:48px;
    height:48px;
    padding:0;
    margin:0;

    background:white;
    color:#222;
    border:2px solid #ddd;
    border-radius:50%;

    font-size:22px;

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;
    z-index:10;
    display:none;

    transition:transform 0.2s ease;
}
    
.title-main{
    font-size:28px;
    font-weight:900;
    color:#111;
    margin-bottom:4px;
}

.title-sub{
    font-size:17px;
    font-weight:700;
    color:#666;
    letter-spacing:2px;
    text-transform:uppercase;
}

/* 評価ボタン専用 */
#reviewButtons button{
    background:#f3f4f6;      /* 薄いグレー */
    color:#333;
    border:2px solid;
    padding:8px 14px;        /* ← 今より小さく */
    font-size:16px;          /* ← 文字も少し小さく */
    border-radius:10px;
}

/* 枠の色 */
#goodBtn{
    border-color:#22c55e;
}

#almostBtn{
    border-color:#f59e0b;
}

#hardBtn{
    border-color:#ef4444;
}

#progressText{
    font-size:18px;
    font-weight:bold;
    color:#666;
    margin-bottom:15px;
}

 /*進捗バー*/ 
#progressBar{
    width:100%;
    max-width:300px;
    height:10px;
    background:#dcdcdc;
    border-radius:999px;
    margin:0 auto 20px auto;
    overflow:hidden;
}
 /*進捗バー残り*/ 
#progressFill{
    width:0%;
    height:100%;
    background:#22c55e;
    transition:width 0.3s ease;
}
 /*ダークモード時背景*/     
body.dark{
    background:#121212;
    color:white;
}

body.dark .container{
    background:#1e1e1e;
}

body.dark #question{
    background:white;
    color:#000;
}

body.dark #answer{
    color:white;
}

body.dark #question{
    background:#2b2b2b;
}
    
body.dark .title-main,
body.dark .title-sub{
    color:black;
}
.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}
 /*ダークモードボタン*/ 
#darkModeBtn{
    width:40px;
    height:40px;
    padding:0;
    font-size:20px;
    border-radius:50%;
}

.fade-in {
    animation: fadeInUp 0.25s ease;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
    
/* スマホ用 */
@media (max-width: 768px){

    button{
        font-size: 15px;
        padding: 10px 18px;
        margin: 6px;
    }
/*スマホ用停止ボタン*/
 #pauseBtn{
    width:32px;
    height:32px;

    font-size:16px;

    display:flex;
    align-items:center;
    justify-content:center;
}

    #darkModeBtn{
        width: 32px;
        height: 32px;
        font-size: 16px;
    }
     /*言語選択へ戻るボタン*/ 
    #backLangBtn{
    padding:6px 10px;
    font-size:14px;
    border-radius:10px;
}
 /*評価ボタン*/ 
    #reviewButtons button{
        font-size: 14px;
        padding: 6px 10px;
        border-radius:999px;
    }
}
    
</style>
</head>

<body>

<div class="container">

<div class="top-bar">
    <button id="darkModeBtn" onclick="toggleDarkMode()">🌙</button>

    <button id="backLangBtn" onclick="goBack()">
        言語選択へ戻る
    </button>

</div>

<div class="app-title">
    <div style="font-size:30px;">📘</div>

    <div class="title-main">天理教用語</div>

    <div class="title-sub">
        Quick Response
    </div>
</div>

<div style="
color:#4255ff;
font-weight:bold;
font-size:14px;
letter-spacing:1px;
margin-bottom:10px;
">
INTERPRETER TRAINING
</div>

<div id="progressText">0 / 0</div>

<div id="progressBar">
    <div id="progressFill"></div>
</div>
    
<div id="question">
読み込み中...
</div>

<div class="timer-circle">
    <svg width="100" height="100">
        <circle
            cx="50"
            cy="50"
            r="45"
            stroke="#eee"
            stroke-width="8"
            fill="none"
        />
        <circle
            id="progress"
            cx="50"
            cy="50"
            r="45"
            stroke="#ff3b30"
            stroke-width="8"
            fill="none"
            stroke-linecap="round"
            stroke-dasharray="283"
            stroke-dashoffset="0"
        />
    </svg>
      <button id="pauseBtn" onclick="togglePause()">⏸</button>

</div>
    
<div id="timer">5</div>

<div id="answer"></div>

<button id="showAnswerBtn" onclick="showAnswer()" style="background:#348f31;">
    答えを表示
</button>

    <div id="reviewButtons" style="display:none; margin-top:20px;">

 <button
    id="goodBtn"
    onclick="rateAnswer('good')">
    🟢 できた
</button>

<button
    id="almostBtn"
    onclick="rateAnswer('almost')">
    🟡 もう少し
</button>

<button
    id="hardBtn"
    onclick="rateAnswer('hard')">
    🔴 がんばる
</button>
        
</div>


    
<button class="next-btn" onclick="nextQuestion()">
次へ
</button>


</div>

<script>


let words = [];
let totalWords = 0;
let answerTimer;
let timer;
let timeLeft = 5;
let firstQuestion = true;
let paused = false;
let reviewWords = [];
let currentWord = null;
    
const totalTime = 5;
// -----------------------------
// JSON読み込み
// -----------------------------
const saved = localStorage.getItem("reviewWords");

if(saved){
    reviewWords = JSON.parse(saved);
}

async function loadJSON() {
    try {

        const response = await fetch("words.json");

        if(!response.ok){
            throw new Error("words.json が見つかりません");
        }

        words = await response.json();
        totalWords = words.length;
        words.sort(() => Math.random() - 0.5);

        nextQuestion();

    } catch(error) {

        document.getElementById("question").innerText =
            "エラー：" + error.message;

        console.error(error);

    }
}

// -----------------------------
// 次の問題
// -----------------------------
function nextQuestion(){

    if(words.length === 0) return;

//スタート前のカウントダウン
 if(firstQuestion){

    firstQuestion = false;

    document.getElementById("progressText").style.display = "none";
    document.getElementById("progressBar").style.display = "none";
    document.getElementById("answer").style.display = "none";
    document.getElementById("reviewButtons").style.display = "none";
    document.getElementById("goodBtn").classList.remove("selected-rating");
    document.getElementById("almostBtn").classList.remove("selected-rating");
    document.getElementById("hardBtn").classList.remove("selected-rating");
    document.getElementById("showAnswerBtn").style.display = "none";
    document.querySelector(".next-btn").style.display = "none";
    document.getElementById("timer").style.display = "none";
    document.getElementById("pauseBtn").style.display = "none";

    const sequence = ["READY", "3", "2", "1"];
    let index = 0;

     //カウントダウンテキストのアニメーション
    updateCountdownText(sequence[index]);

    const countdown = setInterval(() => {

        index++;

        if(index < sequence.length){

           updateCountdownText(sequence[index]);

        }else{

            clearInterval(countdown);

            // GO! を表示
            updateCountdownText("GO!");

            setTimeout(() => {

                //タイマーと答えを見ると次へボタンを一旦非表示
                document.getElementById("timer").style.display = "block";
                document.getElementById("showAnswerBtn").style.display = "inline-block";
                document.querySelector(".next-btn").style.display = "inline-block";
                //進捗バー、数字一旦非表示
                document.getElementById("progressText").style.display = "block";
                document.getElementById("progressBar").style.display = "block";
                
                // 一時停止ボタンを表示（ここで初めて出す）
                document.getElementById("pauseBtn").style.display = "inline-block";
               
                // 最初の問題へ
                nextQuestion();

            }, 500);

        }

    }, 1000);

    return;
}

    clearTimeout(answerTimer);
    clearInterval(timer);

    // 評価ボタンを隠す
    document.getElementById("reviewButtons").style.display = "none";

    // 選択状態をリセット
    document.getElementById("goodBtn").classList.remove("selected-rating");
    document.getElementById("almostBtn").classList.remove("selected-rating");
    document.getElementById("hardBtn").classList.remove("selected-rating");

    const lang = localStorage.getItem("language");

paused = false;
timeLeft = totalTime;

const btn = document.getElementById("pauseBtn");
btn.textContent = "||";
btn.style.background = "#ef4444";
btn.style.color = "white";

const word = words.pop();
currentWord = word;
    
const solved = totalWords - words.length;

document.getElementById("progressText").textContent =
    `${solved} / ${totalWords}`;

document.getElementById("progressFill").style.width =
    `${(solved / totalWords) * 100}%`;
    
document.getElementById("question").textContent = word.jp;
document.getElementById("question").classList.remove("fade-in");
void document.getElementById("question").offsetWidth;
document.getElementById("question").classList.add("fade-in");
    
document.getElementById("answer").style.display = "none";
document.getElementById("showAnswerBtn").style.display = "inline-block";

    switch(lang){

        case "en":
            document.getElementById("answer").textContent = word.en;
            break;

        case "zh":
            document.getElementById("answer").textContent = word.zh;
            break;

        case "pt":
            document.getElementById("answer").textContent = word.pt;
            break;

        case "mn":
            document.getElementById("answer").textContent = word.mn;
            break;

        default:
            document.getElementById("answer").textContent = word.en;
    }

    startTimer();
}

// -----------------------------
// タイマー
// -----------------------------
function startTimer(){

    clearInterval(timer);

    const circle = document.getElementById("progress");
    const radius = 45;
    const circumference = 2 * Math.PI * radius;

    circle.style.strokeDasharray = circumference;

    timer = setInterval(() => {

        if(paused){
            return;
        }

        timeLeft -= 0.03;

        if(timeLeft < 0){
            timeLeft = 0;
        }

        // 数字
        document.getElementById("timer").textContent =
            Math.ceil(timeLeft);

        // 円形タイマー
        const progress = timeLeft / totalTime;
        circle.style.strokeDashoffset =
            circumference - (progress * circumference);

        // 時間切れ
        if(timeLeft <= 0){
            clearInterval(timer);
            showAnswer();
        }

    }, 30);

}

function updateCountdownText(text){

    const question = document.getElementById("question");

    question.classList.remove("countdown-animation");

    // アニメーションをリセット
    void question.offsetWidth;

    question.textContent = text;

    question.classList.add("countdown-animation");
}

// -----------------------------
// 答え表示
// -----------------------------
function showAnswer(){

    // タイマー停止
    clearInterval(timer);

    // 答えを表示
    document.getElementById("answer").style.display = "block";
    document.getElementById("answer").classList.remove("fade-in");
    void document.getElementById("answer").offsetWidth;
    document.getElementById("answer").classList.add("fade-in");
    
    //評価ボタンを表示
    document.getElementById("reviewButtons").style.display = "block";
    document.getElementById("reviewButtons").classList.remove("fade-in");
    void document.getElementById("reviewButtons").offsetWidth;
    document.getElementById("reviewButtons").classList.add("fade-in");
    
    // 「答えを表示」ボタンを隠す
    document.getElementById("showAnswerBtn").style.display = "none";
}
    //自己評価ボタンを押した後のアクション
   function rateAnswer(result){

    // いったん全部リセット
    document.getElementById("goodBtn").classList.remove("selected-rating");
    document.getElementById("almostBtn").classList.remove("selected-rating");
    document.getElementById("hardBtn").classList.remove("selected-rating");

    // 選択したものだけ強調
    if(result === "good"){
        document.getElementById("goodBtn").classList.add("selected-rating");
    }

    if(result === "almost"){
        document.getElementById("almostBtn").classList.add("selected-rating");
    }

    if(result === "hard"){
        document.getElementById("hardBtn").classList.add("selected-rating");
    }
    
    if(result === "almost" || result === "hard"){
        reviewWords.push(currentWord);
    }
    localStorage.setItem("reviewWords", JSON.stringify(reviewWords));

    currentWord = null;
       
    console.log("自己評価:", result);

}
//タイマー再生／一時停止ボタン
function togglePause(){

    paused = !paused;

    const btn = document.getElementById("pauseBtn");

    if(paused){
        btn.textContent = "▶︎"; // 再生
        btn.style.background = "#84cc16";
        btn.style.color = "white";
    }else{
        btn.textContent = "||"; // 一時停止
        btn.style.background = "#ef4444";
        btn.style.color = "white";
    }
}
    
// -----------------------------
// 戻る
// -----------------------------
function goBack(){
    window.location.href = "index.html";
}

// -----------------------------
// 起動
// -----------------------------
loadJSON();

//ダークモードボタン
function toggleDarkMode(){
    document.body.classList.toggle("dark");

    const btn = document.getElementById("darkModeBtn");
    btn.textContent =
        document.body.classList.contains("dark") ? "☀️" : "🌙";
}
// ============================
// キーボードショートカット
// Space：一時停止／再生
// Enter：次の問題
// ============================
document.addEventListener("keydown", function(e){

    if(e.code === "Space"){
        e.preventDefault();
        togglePause();
    }

    if(e.code === "Enter"){
        e.preventDefault();
        nextQuestion();
    }

});
    
</script>

</body>
</html>
